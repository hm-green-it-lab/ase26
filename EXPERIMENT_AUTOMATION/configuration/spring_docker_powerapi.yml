extends: spring_docker_jmeter.yml
experiment:
  type: spring_docker_powerapi

  remote_docker_start: docker compose -f ${SUT_BASE_DIR}/spring-rest-service/docker-compose.yaml -f ${SUT_BASE_DIR}/spring-rest-service/docker-compose.override.powerapi.yaml up -d
  remote_docker_stop: docker compose -f ${SUT_BASE_DIR}/spring-rest-service/docker-compose.yaml -f ${SUT_BASE_DIR}/spring-rest-service/docker-compose.override.powerapi.yaml down
  remote_docker_logs: docker compose -f ${SUT_BASE_DIR}/spring-rest-service/docker-compose.yaml logs