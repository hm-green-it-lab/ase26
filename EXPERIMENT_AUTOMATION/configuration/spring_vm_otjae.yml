extends: spring_vm_jmeter.yml
experiment:
  type: spring_vm_otjae

  host_tool_start:
  host_tool_stop: 
  host_tool_logs:

  remote_docker_start: docker-compose -f ${VM_BASE_DIR}/spring-rest-service/docker-compose.yaml -f ${VM_BASE_DIR}/spring-rest-service/docker-compose.override.otel.yaml up -d
  remote_docker_stop: docker-compose -f ${VM_BASE_DIR}/spring-rest-service/docker-compose.yaml -f ${VM_BASE_DIR}/spring-rest-service/docker-compose.override.otel.yaml down
  remote_docker_logs: docker-compose -f ${VM_BASE_DIR}/spring-rest-service/docker-compose.yaml logs