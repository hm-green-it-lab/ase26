extends: spring_vm_jmeter.yml
experiment:
  type: spring_vm_scaphandre

  vm_container_name: spring-rest-energy-test

  http_logger_jar_path: ${LOCAL_BASE_DIR}/http-logger-1.0-runner.jar
  http_logger_jar_url: ${HTTP_LOGGER_JAR_URL}
  # Scaphandre metrics are exposed on the host (hypervisor) where the tool runs
  http_logger_url: http://${SUT_HOST}:8111/metrics

  local_output_directory: ./output
  rittal_jar_path: ${LOCAL_BASE_DIR}/rittal-reader-1.0-runner.jar

  vm_guest_host: ${VM_HOST}
  vm_guest_ssh_port: ${VM_PORT}

  # Tool runs on the host / hypervisor via docker-compose override
  host_tool_start: docker compose -f ${SUT_BASE_DIR}/spring-rest-service/docker-compose.override.scaphandre-host-vm.yaml up -d
  host_tool_stop: docker compose -f ${SUT_BASE_DIR}/spring-rest-service/docker-compose.override.scaphandre-host-vm.yaml down
  host_tool_logs: docker compose -f ${SUT_BASE_DIR}/spring-rest-service/docker-compose.override.scaphandre-host-vm.yaml logs

  remote_docker_start: docker-compose -f ${VM_BASE_DIR}/spring-rest-service/docker-compose.yaml -f ${VM_BASE_DIR}/spring-rest-service/docker-compose.override.scaphandre-vm.yaml up -d
  remote_docker_stop: docker-compose -f ${VM_BASE_DIR}/spring-rest-service/docker-compose.yaml -f ${VM_BASE_DIR}/spring-rest-service/docker-compose.override.scaphandre-vm.yaml down
  remote_docker_logs: docker-compose -f ${VM_BASE_DIR}/spring-rest-service/docker-compose.yaml -f ${VM_BASE_DIR}/spring-rest-service/docker-compose.override.scaphandre-vm.yaml logs