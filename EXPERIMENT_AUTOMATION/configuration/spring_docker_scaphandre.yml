extends: spring_docker_jmeter.yml
experiment:
  type: spring_docker_scaphandre

  http_logger_jar_path: ${LOCAL_BASE_DIR}/http-logger-1.0-runner.jar
  http_logger_jar_url: ${HTTP_LOGGER_JAR_URL}

  http_logger_url: http://${SUT_HOST}:8888/metrics

  remote_docker_start: 
    - sudo sh -c 'docker compose -f ${SUT_BASE_DIR}/spring-rest-service/docker-compose.override.scaphandre.yaml up -d'
    - docker compose -f ${SUT_BASE_DIR}/spring-rest-service/docker-compose.yaml up -d
  remote_docker_stop: 
    - docker compose -f ${SUT_BASE_DIR}/spring-rest-service/docker-compose.yaml down
    - sudo sh -c 'docker compose -f ${SUT_BASE_DIR}/spring-rest-service/docker-compose.override.scaphandre.yaml down'
  remote_docker_logs: docker compose -f ${SUT_BASE_DIR}/spring-rest-service/docker-compose.yaml logs