services:
  scaphandre-host:
    image: hubblo/scaphandre:1.0.2
    privileged: true
    ports:
      - "8888:8080"
    volumes:
      - /proc:/proc
      - /sys/class/powercap:/sys/class/powercap
      - /var/run:/var/run
      - /var/lib/libvirt/scaphandre/vm1:/var/lib/libvirt/scaphandre/vm1
    command: qemu